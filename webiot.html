<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Feeder Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        button.feed-btn { background-color: #28a745; font-size: 18px; font-weight: bold; padding: 15px; }
        button.feed-btn:hover { background-color: #218838; }
        .input-group { margin: 15px 0; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .status { margin-top: 20px; font-weight: bold; color: #555; }
        .hidden { display: none; }
        .logout-btn { background-color: #dc3545; margin-top: 20px;}
        .logout-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="card" id="loginPanel">
    <h2>🔐 Login Sistem</h2>
    <div class="input-group">
        <label>Email:</label>
        <input type="email" id="loginEmail" placeholder="Masukkan Email">
    </div>
    <div class="input-group">
        <label>Password:</label>
        <input type="password" id="loginPassword" placeholder="Masukkan Password">
    </div>
    <button id="btnLogin">Masuk</button>
    <div class="status" id="loginStatus"></div>
</div>

<div class="card hidden" id="controlPanel">
    <h2>🐟 Kontrol Fish Feeder</h2>
    <button id="btnFeed" class="feed-btn">Beri Pakan Sekarang!</button>

    <hr style="margin: 20px 0; border: 0.5px solid #eee;">

    <h3>Atur Jadwal Otomatis</h3>
    <div class="input-group">
        <label>Jam (0-23):</label>
        <input type="number" id="jam" min="0" max="23">
    </div>
    <div class="input-group">
        <label>Menit (0-59):</label>
        <input type="number" id="menit" min="0" max="59">
    </div>
    <button id="btnJadwal">Simpan Jadwal</button>

    <div class="status" id="statusTeks">Menghubungkan ke alat...</div>
    <button id="btnLogout" class="logout-btn">Keluar (Logout)</button>
</div>

<!-- Menggunakan Firebase Modular SDK v9 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // Konfigurasi Firebase-mu
  const firebaseConfig = {
    apiKey: "AIzaSyBQG-nTj71DHAcnA7SV_057b9DttCBNJyk",
    authDomain: "smart-fish-feeder-57ce1.firebaseapp.com",
    databaseURL: "https://smart-fish-feeder-57ce1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "smart-fish-feeder-57ce1",
    storageBucket: "smart-fish-feeder-57ce1.firebasestorage.app",
    messagingSenderId: "364327788145",
    appId: "1:364327788145:web:25cb818dd377a693d285d0"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // DOM Elements
  const loginPanel = document.getElementById('loginPanel');
  const controlPanel = document.getElementById('controlPanel');
  const btnLogin = document.getElementById('btnLogin');
  const btnLogout = document.getElementById('btnLogout');
  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginStatus = document.getElementById('loginStatus');

  const btnFeed = document.getElementById('btnFeed');
  const btnJadwal = document.getElementById('btnJadwal');
  const inputJam = document.getElementById('jam');
  const inputMenit = document.getElementById('menit');
  const statusTeks = document.getElementById('statusTeks');

  // --- LOGIKA AUTENTIKASI ---

  // Proses Login
  btnLogin.addEventListener('click', () => {
      loginStatus.innerText = "Memeriksa kredensial...";
      loginStatus.style.color = "blue";
      
      signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value)
          .then((userCredential) => {
              // Jika sukses, onAuthStateChanged akan otomatis berjalan
          })
          .catch((error) => {
              loginStatus.innerText = "Login Gagal: Periksa Email/Password!";
              loginStatus.style.color = "red";
          });
  });

  // Proses Logout
  btnLogout.addEventListener('click', () => {
      signOut(auth).then(() => {
          // Akan ditangkap oleh onAuthStateChanged
      });
  });

  // Pantau Status Login
  onAuthStateChanged(auth, (user) => {
      if (user) {
          // User sedang login, tampilkan kontrol
          loginPanel.classList.add('hidden');
          controlPanel.classList.remove('hidden');
          mulaiBacaDatabase(); // Panggil fungsi baca database
      } else {
          // User logout, tampilkan panel login
          loginPanel.classList.remove('hidden');
          controlPanel.classList.add('hidden');
          loginEmail.value = "";
          loginPassword.value = "";
          loginStatus.innerText = "";
      }
  });

  // --- LOGIKA KONTROL DATABASE (HANYA BERJALAN JIKA SUDAH LOGIN) ---
  function mulaiBacaDatabase() {
      // Tombol Pakan
      btnFeed.onclick = () => {
          set(ref(db, 'control/trigger_feed'), true)
            .then(() => {
              statusTeks.innerText = "Perintah Pakan Terkirim!";
              statusTeks.style.color = "green";
            });
      };

      // Tombol Jadwal
      btnJadwal.onclick = () => {
          const jamVal = parseInt(inputJam.value);
          const menitVal = parseInt(inputMenit.value);
          if(!isNaN(jamVal) && !isNaN(menitVal)) {
              set(ref(db, 'control/jadwal_jam'), jamVal);
              set(ref(db, 'control/jadwal_menit'), menitVal);
              statusTeks.innerText = `Jadwal disetel ke ${jamVal}:${menitVal}`;
              statusTeks.style.color = "blue";
          }
      };

      // Sinkronisasi data real-time
      onValue(ref(db, 'control'), (snapshot) => {
          if (snapshot.exists()) {
              const data = snapshot.val();
              inputJam.value = data.jadwal_jam !== undefined ? data.jadwal_jam : "";
              inputMenit.value = data.jadwal_menit !== undefined ? data.jadwal_menit : "";
              statusTeks.innerText = "Sistem Tersinkronisasi!";
              statusTeks.style.color = "green";
          }
      });
  }
</script>

</body>
</html>
